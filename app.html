<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAC | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-100">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white flex-shrink-0 flex flex-col z-20">
            <div class="px-6 py-5 text-xl font-bold border-b border-slate-800 flex items-center gap-2">
                <i class="fas fa-truck-fast text-blue-500"></i> VAC v1.0
            </div>
            <nav class="flex-1 mt-4 px-4 space-y-1 overflow-y-auto pb-6">
                <a href="#dashboard" data-nav="dashboard" onclick="VAC.App.navigate('dashboard');return false;" class="nav-link"><i class="fas fa-th-large"></i>Dashboard</a>
                <a href="#reports"   data-nav="reports"   onclick="VAC.App.navigate('reports');return false;"   class="nav-link"><i class="fas fa-file-alt"></i>Reports</a>
                <a href="#vehicles"  data-nav="vehicles"  onclick="VAC.App.navigate('vehicles');return false;"  class="nav-link"><i class="fas fa-truck"></i>Vehicles</a>
                <a href="#operators" data-nav="operators" onclick="VAC.App.navigate('operators');return false;" class="nav-link"><i class="fas fa-user-gear"></i>Operators</a>
                <a href="#sites"     data-nav="sites"     onclick="VAC.App.navigate('sites');return false;"     class="nav-link"><i class="fas fa-location-dot"></i>Sites</a>
                <div class="pt-2 mt-2 border-t border-slate-800">
                    <a href="#settings" data-nav="settings" onclick="VAC.App.navigate('settings');return false;" class="nav-link"><i class="fas fa-cog"></i>Settings</a>
                </div>
            </nav>
        </aside>

        <!-- Main -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <header id="portal-header" class="h-[64px] bg-white border-b flex items-center px-6 flex-shrink-0"></header>
            <div id="view-container" class="flex-1 overflow-y-auto p-8"></div>
        </main>
    </div>

    <!-- App scripts (classic order; no bundler needed) -->
    <script src="js/firebase-config.js"></script>
    <script src="js/utils/storage.js"></script>
    <script src="js/utils/notifications.js"></script>
    <script src="js/utils/validation.js"></script>
    <script src="js/utils/exporters.js"></script>
    <script src="js/data/seed.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/modules/dashboard.js"></script>
    <script src="js/modules/reports.js"></script>
    <script src="js/modules/vehicles.js"></script>
    <script src="js/modules/operators.js"></script>
    <script src="js/modules/sites.js"></script>
    <script src="js/modules/settings.js"></script>
    <script src="js/app.js"></script>

    <!-- To enable Firebase, uncomment these and set useFirebase:true in js/firebase-config.js
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    -->
</body>
</html>
