<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Vision Infra - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Exact 1:1 HVI Theme Overrides */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
        }
        
        /* Header Styling */
        .hvi-header { 
            background-color: #2c3e50; 
            color: #ffffff; 
            height: 50px;
        }
        .hvi-btn-white { 
            background: #ffffff; 
            color: #2c3e50; 
            border-radius: 4px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 28px; 
            cursor: pointer; 
            border: none;
            transition: opacity 0.2s;
        }
        .hvi-btn-white:hover { opacity: 0.9; }

        /* Sidebar Styling */
        .hvi-sidebar { 
            background-color: #ffffff; 
            border-right: 1px solid #e2e8f0; 
            width: 250px; 
        }
        .sidebar-item { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 12px 20px; 
            color: #4a5568; 
            font-size: 14px; 
            border-left: 3px solid transparent; 
            cursor: pointer; 
            border-bottom: 1px solid #f8fafc;
        }
        .sidebar-item:hover { 
            background-color: #f8fafc; 
        }
        .sidebar-item.active { 
            background-color: #eef5ff; 
            border-left-color: #0ea5e9; 
            color: #0ea5e9; 
            font-weight: 500; 
        }
        .sidebar-icon { 
            width: 24px; 
            text-align: left; 
            margin-right: 10px; 
            font-size: 15px; 
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-slate-800">

    <header class="hvi-header flex items-center justify-between px-4 flex-shrink-0 z-30 shadow-sm relative">
        <div class="flex items-center gap-3">
            <button class="hvi-btn-white w-8 h-8 !p-0 shadow-sm"><i class="fas fa-bars text-[15px]"></i></button>
            <div class="flex items-center gap-2 font-semibold text-[13px]">
                <span>Sites :</span>
                <select class="text-slate-800 rounded px-2 py-1 border-none outline-none w-32 font-normal shadow-sm h-7">
                    <option>All</option>
                </select>
            </div>
        </div>

        <div class="absolute left-1/2 -translate-x-1/2 flex items-center gap-3">
            <div class="flex items-center justify-center font-bold italic tracking-tighter">
                <span class="text-amber-400 text-xl">V</span>
                <span class="text-blue-400 text-xl">A</span>
                <span class="text-white text-xl">C</span>
            </div>
            <span class="font-bold tracking-wide text-[15px]">Vision Infra - V1.1</span>
        </div>

        <div class="flex items-center gap-2">
            <select class="text-slate-800 rounded px-2 py-1 text-[13px] border-none outline-none h-7 shadow-sm font-medium mr-1">
                <option>English</option>
            </select>
            <button class="hvi-btn-white w-7 shadow-sm"><i class="fas fa-user text-[13px]"></i></button>
            <button class="hvi-btn-white w-7 shadow-sm"><i class="fas fa-sync-alt text-[13px]"></i></button>
            <button class="hvi-btn-white w-7 shadow-sm"><i class="fas fa-power-off text-[13px]"></i></button>
            <button class="hvi-btn-white w-7 shadow-sm"><i class="fas fa-expand text-[13px]"></i></button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="hvi-sidebar flex flex-col flex-shrink-0 z-20">
            <nav class="flex-1 overflow-y-auto mt-0">
                <a href="#dashboard" onclick="VAC.App.navigate('dashboard');return false;" class="sidebar-item">
                    <div class="flex items-center">
                        <i class="fas fa-braille sidebar-icon text-slate-400"></i>
                        <span>Dashboard</span>
                    </div>
                </a>
                <a href="#reports" onclick="VAC.App.navigate('reports');return false;" class="sidebar-item active">
                    <div class="flex items-center">
                        <i class="fas fa-clipboard-check sidebar-icon"></i>
                        <span>Inspection</span>
                    </div>
                    <i class="fas fa-chevron-right text-[10px]"></i>
                </a>
                <a href="#logbook" onclick="VAC.App.navigate('logbook');return false;" class="sidebar-item">
                    <div class="flex items-center">
                        <i class="fas fa-book sidebar-icon text-slate-400"></i>
                        <span>Logbook</span>
                    </div>
                </a>
                <a href="#fuel" onclick="VAC.App.navigate('fuel');return false;" class="sidebar-item">
                    <div class="flex items-center">
                        <i class="fas fa-gas-pump sidebar-icon text-slate-400"></i>
                        <span>Fuel Management</span>
                    </div>
                    <i class="fas fa-chevron-right text-[10px] text-slate-300"></i>
                </a>
                <a href="#vehicles" onclick="VAC.App.navigate('vehicles');return false;" class="sidebar-item">
                    <div class="flex items-center">
                        <i class="fas fa-truck sidebar-icon text-slate-400"></i>
                        <span>Vehicles</span>
                    </div>
                    <i class="fas fa-chevron-right text-[10px] text-slate-300"></i>
                </a>
                <a href="#masters" onclick="VAC.App.navigate('masters');return false;" class="sidebar-item">
                    <div class="flex items-center">
                        <i class="fas fa-cogs sidebar-icon text-slate-400"></i>
                        <span>Master Data</span>
                    </div>
                    <i class="fas fa-chevron-right text-[10px] text-slate-300"></i>
                </a>
            </nav>
            
            <div class="border-t border-slate-200">
                <a href="#analytics" onclick="VAC.App.navigate('analytics');return false;" class="sidebar-item">
                    <div class="flex items-center">
                        <i class="fas fa-chart-line sidebar-icon text-slate-400"></i>
                        <span>Analytics Report & KPIs</span>
                    </div>
                    <i class="fas fa-chevron-right text-[10px] text-slate-300"></i>
                </a>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-5" id="view-container">
            </main>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/utils/storage.js"></script>
    <script src="js/utils/notifications.js"></script>
    <script src="js/utils/validation.js"></script>
    <script src="js/utils/exporters.js"></script>
    <script src="js/data/seed.js"></script>
    <script src="js/auth.js"></script>
    
    <script src="js/modules/dashboard.js"></script>
    <script src="js/modules/analytics.js"></script>
    <script src="js/modules/vehicles.js"></script>
    <script src="js/modules/operators.js"></script>
    <script src="js/modules/sites.js"></script>
    <script src="js/modules/reports.js"></script>
    <script src="js/modules/checklists.js"></script>
    <script src="js/modules/faults.js"></script>
    <script src="js/modules/workorders.js"></script>
    <script src="js/modules/masters.js"></script>
    <script src="js/modules/users.js"></script>
    <script src="js/modules/settings.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
