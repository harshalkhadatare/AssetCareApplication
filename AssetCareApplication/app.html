<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAC | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-100">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar (HVI-style, collapsible, grouped) -->
        <aside class="sidebar bg-slate-900 text-white flex-shrink-0 flex flex-col z-20">
            <div class="brand px-5 py-5 text-lg font-bold border-b border-slate-800 flex items-center gap-2 whitespace-nowrap">
                <i class="fas fa-truck-fast text-blue-500"></i><span class="brand-text">VAC v1.0</span>
            </div>
            <nav class="flex-1 mt-2 px-3 overflow-y-auto pb-6">
                <div class="nav-section-label">Overview</div>
                <a href="#dashboard" data-nav="dashboard" onclick="VAC.App.navigate('dashboard');return false;" class="nav-link"><i class="fas fa-th-large"></i><span class="nav-label">Dashboard</span></a>
                <a href="#analytics" data-nav="analytics" onclick="VAC.App.navigate('analytics');return false;" class="nav-link"><i class="fas fa-chart-line"></i><span class="nav-label">Analytics</span></a>

                <div class="nav-section-label">Fleet</div>
                <a href="#vehicles" data-nav="vehicles" onclick="VAC.App.navigate('vehicles');return false;" class="nav-link"><i class="fas fa-truck"></i><span class="nav-label">Vehicles</span></a>
                <a href="#operators" data-nav="operators" onclick="VAC.App.navigate('operators');return false;" class="nav-link"><i class="fas fa-user-gear"></i><span class="nav-label">Operators</span></a>
                <a href="#sites" data-nav="sites" onclick="VAC.App.navigate('sites');return false;" class="nav-link"><i class="fas fa-location-dot"></i><span class="nav-label">Sites</span></a>

                <div class="nav-section-label">Inspections</div>
                <a href="#reports" data-nav="reports" onclick="VAC.App.navigate('reports');return false;" class="nav-link"><i class="fas fa-clipboard-check"></i><span class="nav-label">Inspection Reports</span></a>
                <a href="#checklists" data-nav="checklists" onclick="VAC.App.navigate('checklists');return false;" class="nav-link"><i class="fas fa-list-check"></i><span class="nav-label">Inspection Checklist</span></a>
                <a href="#faults" data-nav="faults" onclick="VAC.App.navigate('faults');return false;" class="nav-link"><i class="fas fa-triangle-exclamation"></i><span class="nav-label">Fault List</span></a>

                <div class="nav-section-label">Maintenance</div>
                <a href="#workorders" data-nav="workorders" onclick="VAC.App.navigate('workorders');return false;" class="nav-link"><i class="fas fa-screwdriver-wrench"></i><span class="nav-label">Work Orders</span></a>

                <div class="nav-section-label">Administration</div>
                <a href="#masters" data-nav="masters" onclick="VAC.App.navigate('masters');return false;" class="nav-link"><i class="fas fa-database"></i><span class="nav-label">Master Data</span></a>
                <a href="#users" data-nav="users" onclick="VAC.App.navigate('users');return false;" class="nav-link"><i class="fas fa-users-gear"></i><span class="nav-label">User Management</span></a>
                <a href="#settings" data-nav="settings" onclick="VAC.App.navigate('settings');return false;" class="nav-link"><i class="fas fa-cog"></i><span class="nav-label">Settings</span></a>
            </nav>
            <div class="sidebar-foot px-5 py-3 text-[11px] text-slate-500 border-t border-slate-800 whitespace-nowrap">
                Vision Infra Equipment Solutions ltd
            </div>
        </aside>

        <!-- Main -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <header id="portal-header" class="h-[64px] bg-white border-b flex items-center px-6 flex-shrink-0"></header>
            <div id="view-container" class="flex-1 overflow-y-auto p-8"></div>
        </main>
    </div>

    <!-- App scripts (classic order; no bundler needed) -->
    <script src="js/firebase-config.js"></script>
    <script src="js/utils/storage.js"></script>
    <script src="js/utils/notifications.js"></script>
    <script src="js/utils/validation.js"></script>
    <script src="js/utils/exporters.js"></script>
    <script src="js/data/seed.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/modules/dashboard.js?v=20260708-7"></script>
    <script src="js/modules/analytics.js"></script>
    <script src="js/modules/vehicles.js"></script>
    <script src="js/modules/operators.js"></script>
    <script src="js/modules/sites.js"></script>
    <script src="js/modules/reports.js"></script>
    <script src="js/modules/checklists.js"></script>
    <script src="js/modules/faults.js"></script>
    <script src="js/modules/workorders.js"></script>
    <script src="js/modules/masters.js"></script>
    <script src="js/modules/users.js"></script>
    <script src="js/modules/settings.js"></script>
    <script src="js/app.js"></script>

    <!-- To enable Firebase, uncomment these and set useFirebase:true in js/firebase-config.js
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    -->
</body>
</html>
